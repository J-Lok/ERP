{% extends 'base.html' %}
{% block title %}{{ title }} — HR{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0"><i class="fas fa-briefcase text-primary me-2"></i>{{ title }}</h2>
  <a href="{% url 'hr:position_list' %}" class="btn btn-outline-secondary btn-sm">
    <i class="fas fa-arrow-left me-1"></i>Back
  </a>
</div>
<div class="card shadow-sm" style="max-width: 520px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
      </div>
      {% endfor %}
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">Save Position</button>
        <a href="{% url 'hr:position_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
