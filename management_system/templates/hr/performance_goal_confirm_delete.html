{% extends 'base.html' %}
{% block title %}Delete Performance Goal — HR{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h2 class="mb-4">Delete Performance Goal</h2>
    <p>Are you sure you want to delete the performance goal for <strong>{{ goal.employee.full_name }}</strong>?</p>
    <p><strong>{{ goal.title }}</strong></p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Delete</button>
      <a href="{% url 'hr:performance_goal_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
