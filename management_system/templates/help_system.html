{% load i18n %}
<!-- Help System Modal -->
<div class="modal fade" id="helpModal" tabindex="-1" aria-labelledby="helpModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="helpModalLabel">
          <i class="fas fa-question-circle text-primary me-2"></i>
          <span id="helpTitle">{% trans "Help" %}</span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{% trans 'Close' %}"></button>
      </div>
      <div class="modal-body" id="helpContent">
        <!-- Help content will be loaded here -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Close" %}</button>
      </div>
    </div>
  </div>
</div>

<!-- Help Button -->
<button id="helpButton" class="btn btn-outline-primary position-fixed" style="bottom: 100px; right: 20px; z-index: 1050;" data-bs-toggle="modal" data-bs-target="#helpModal" title="{% trans 'Help' %}">
  <i class="fas fa-question-circle"></i>
</button>

// Function to show help for current app
function showHelp() {
  const currentUrl = window.location.pathname;
  let appName = 'core'; // default

  // Determine current app from URL
  if (currentUrl.includes('/employees/')) appName = 'employees';
  else if (currentUrl.includes('/projects/')) appName = 'projects';
  else if (currentUrl.includes('/inventory/')) appName = 'inventory';
  else if (currentUrl.includes('/finance/')) appName = 'finance';
  else if (currentUrl.includes('/hr/')) appName = 'hr';
  else if (currentUrl.includes('/crm/')) appName = 'crm';
  else if (currentUrl.includes('/meetings/')) appName = 'meetings';
  else if (currentUrl.includes('/notifications/')) appName = 'notifications';
  else if (currentUrl.includes('/marketplace/')) appName = 'marketplace';
  else if (currentUrl.includes('/accounts/') && currentUrl.includes('company_profile')) appName = 'core';

  const help = helpContent[appName] || helpContent['core'];

  document.getElementById('helpTitle').textContent = help.title;
  document.getElementById('helpContent').innerHTML = help.content;
}

// Initialize help button
document.addEventListener('DOMContentLoaded', function() {
  const helpButton = document.getElementById('helpButton');
  if (helpButton) {
    helpButton.addEventListener('click', showHelp);
  }
});
