{% load i18n %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Access Denied" %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #F8F9FA; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-card { text-align: center; padding: 3rem; max-width: 480px; }
        .error-code { font-size: 6rem; font-weight: 700; color: #fd7e14; line-height: 1; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">403</div>
        <h2 class="mt-3 mb-2">{% trans "Access Denied" %}</h2>
        <p class="text-muted mb-4">{% trans "You don't have permission to access this page." %}</p>
        <a href="/" class="btn btn-primary">
            <i class="fas fa-home me-2"></i>{% trans "Back to Home" %}
        </a>
    </div>
</body>
</html>
