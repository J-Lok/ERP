{% extends "base.html" %}
{% block content %}
<div class="alert alert-danger" role="alert">
    <h4 class="alert-heading">Delete Transaction</h4>
    <p>Are you sure you want to delete this transaction?</p>
    <p><strong>Account:</strong> {{ transaction.account.name }}<br>
    <strong>Amount:</strong> {{ transaction.amount }}<br>
    <strong>Date:</strong> {{ transaction.date }}</p>
    <hr>
    <p class="mb-0">This action cannot be undone.</p>
</div>

<form method="post" class="d-inline">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Confirm Delete</button>
    <a href="{% url 'finance:transaction_list' %}" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
</form>
{% endblock %}
