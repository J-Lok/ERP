{% extends 'accounts/base_auth.html' %}

{% block title %}Password Reset Complete — ERP System{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="fas fa-check-circle fa-2x mb-2" aria-hidden="true"></i>
        <h1 class="h3 mb-1">Password Reset Complete</h1>
        <p class="mb-0 opacity-75">You're all set</p>
    </div>

    <div class="auth-body text-center">
        <p class="mb-4">
            Your password has been set successfully.
            You can now log in with your new password.
        </p>
        <a href="{% url 'accounts:company_login' %}" class="btn btn-primary btn-lg">
            <i class="fas fa-sign-in-alt me-2" aria-hidden="true"></i>Log In
        </a>
    </div>
</div>
{% endblock %}
