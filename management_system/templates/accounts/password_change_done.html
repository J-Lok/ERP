{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow-sm">
            <div class="card-body text-center py-5">
                <i class="fas fa-check-circle fa-4x text-success mb-4" aria-hidden="true"></i>
                <h4 class="mb-2">Password Changed Successfully!</h4>
                <p class="text-muted mb-4">Your password has been updated and is now active.</p>
                
                <div class="d-flex justify-content-center gap-2 flex-wrap">
                    <a href="{% url 'accounts:user_profile' %}" class="btn btn-primary">
                        <i class="fas fa-user me-1"></i>Back to Profile
                    </a>
                    <a href="{% url 'core:dashboard' %}" class="btn btn-secondary">
                        <i class="fas fa-home me-1"></i>Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
