{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="fas fa-check-circle fa-4x text-success mb-4"></i>
                <h4>Password Changed Successfully!</h4>
                <p class="text-muted">Your password has been updated.</p>
                <div class="mt-4">
                    <a href="{% url 'accounts:user_profile' %}" class="btn btn-primary me-2">
                        <i class="fas fa-user me-1"></i>Back to Profile
                    </a>
                    <a href="{% url 'core:dashboard' %}" class="btn btn-secondary">
                        <i class="fas fa-home me-1"></i>Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
