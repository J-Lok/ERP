{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Change Password — ERP System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h4 class="mb-0">
                    <i class="fas fa-key me-2 text-primary" aria-hidden="true"></i>Change Password
                </h4>
            </div>

            <div class="card-body">
                {% if form.non_field_errors %}
                <div class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-circle me-2" aria-hidden="true"></i>
                    {{ form.non_field_errors }}
                </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="d-flex justify-content-between mt-4 flex-wrap gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-check-circle me-1" aria-hidden="true"></i>Update Password
                        </button>
                        <a href="{% url 'accounts:user_profile' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-1" aria-hidden="true"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
