{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Confirm Logout" %} — ERP System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm text-center">
            <div class="card-body py-5 px-4">
                <i class="fas fa-sign-out-alt fa-3x text-warning mb-3" aria-hidden="true"></i>
                <h5 class="mb-1">{% trans "Confirm Logout" %}</h5>
                <p class="text-muted mb-4">{% trans "You will need to log in again to access your account." %}</p>

                <form method="post" action="{% url 'accounts:company_logout' %}">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-sign-out-alt me-1" aria-hidden="true"></i>{% trans "Yes, Logout" %}
                        </button>
                        <a href="{% url 'core:dashboard' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-1" aria-hidden="true"></i>{% trans "Cancel" %}
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
