{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-calendar-alt me-2"></i>Project Calendar</h2>
    <div>
        <a href="{% url 'projects:project_list' %}" class="btn btn-secondary btn-sm">
            <i class="fas fa-arrow-left me-1"></i>Back to List
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div id="projectCalendar"></div>
    </div>
</div>

<!-- Calendar Legend -->
<div class="row mt-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0">Calendar Legend</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <div class="d-flex align-items-center">
                            <div class="legend-color bg-danger me-2"></div>
                            <span>Critical Priority</span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="d-flex align-items-center">
                            <div class="legend-color bg-warning me-2"></div>
                            <span>High Priority</span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="d-flex align-items-center">
                            <div class="legend-color bg-info me-2"></div>
                            <span>Medium Priority</span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="d-flex align-items-center">
                            <div class="legend-color bg-success me-2"></div>
                            <span>Completed Tasks</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
<style>
#projectCalendar {
    min-height: 600px;
}

.legend-color {
    width: 20px;
    height: 20px;
    border-radius: 3px;
}

.fc-event {
    cursor: pointer;
}
</style>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('projectCalendar');
    
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: [
            {% for project in projects %}
            {
                title: '{{ project.name }}',
                start: '{{ project.start_date|date:"Y-m-d" }}',
                end: '{{ project.end_date|date:"Y-m-d" }}',
                url: '/projects/{{ project.id }}/',
                color: '{% if project.priority == "critical" %}#dc3545{% elif project.priority == "high" %}#fd7e14{% elif project.priority == "medium" %}#ffc107{% else %}#198754{% endif %}',
                extendedProps: {
                    type: 'project',
                    priority: '{{ project.priority }}',
                    status: '{{ project.status }}'
                }
            },
            {% endfor %}
        ],
        eventClick: function(info) {
            info.jsEvent.preventDefault(); // don't let the browser navigate
            
            if (info.event.url) {
                // Show modal with event details
                showEventDetails(info.event);
            }
        },
        eventMouseEnter: function(info) {
            // Show tooltip on hover
            const tooltip = document.createElement('div');
            tooltip.className = 'fc-event-tooltip';
            tooltip.innerHTML = `
                <strong>${info.event.title}</strong><br>
                <small>${info.event.extendedProps.type} • ${info.event.extendedProps.priority}</small>
            `;
            document.body.appendChild(tooltip);
            
            const rect = info.el.getBoundingClientRect();
            tooltip.style.position = 'absolute';
            tooltip.style.left = rect.left + 'px';
            tooltip.style.top = rect.top - 40 + 'px';
            tooltip.style.zIndex = '1000';
            tooltip.style.backgroundColor = 'white';
            tooltip.style.padding = '5px';
            tooltip.style.border = '1px solid #ddd';
            tooltip.style.borderRadius = '3px';
            tooltip.style.boxShadow = '0 2px 5px rgba(0,0,0,0.1)';
            
            info.el.tooltip = tooltip;
        },
        eventMouseLeave: function(info) {
            // Remove tooltip
            if (info.el.tooltip) {
                info.el.tooltip.remove();
            }
        }
    });
    
    calendar.render();
    
    function showEventDetails(event) {
        // Create modal for event details
        const modal = document.createElement('div');
        modal.className = 'modal fade';
        modal.innerHTML = `
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">${event.title}</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p><strong>Type:</strong> ${event.extendedProps.type}</p>
                        <p><strong>Priority:</strong> ${event.extendedProps.priority}</p>
                        <p><strong>Status:</strong> ${event.extendedProps.status}</p>
                        <p><strong>Start:</strong> ${event.start.toLocaleDateString()}</p>
                        <p><strong>End:</strong> ${event.end ? event.end.toLocaleDateString() : 'N/A'}</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <a href="${event.url}" class="btn btn-primary">View Details</a>
                    </div>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
        const bsModal = new bootstrap.Modal(modal);
        bsModal.show();
        
        modal.addEventListener('hidden.bs.modal', function() {
            modal.remove();
        });
    }
});
</script>
{% endblock %}
