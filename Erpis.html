function Avatar({ initials, size = 34 }) {
  const palette = ['#1a6b45','#1a4a6b','#6b3a1a','#4a1a6b','#1a5a6b','#4a6b1a'];
  const bg = palette[(initials.charCodeAt(0) + (initials.charCodeAt(1)||0)) % palette.length];
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%', background:bg,
      color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
      fontSize:size*0.34, fontWeight:700, flexShrink:0, letterSpacing:'0.02em',
    }}>{initials}</div>
  );
}

function Badge({ status }) {
  const map = {
    active:     { label:'Active',     c: AC.emerald.main },
    on_leave:   { label:'On Leave',   c: AC.amber.main   },
    inactive:   { label:'Inactive',   c: T.muted         },
    terminated: { label:'Terminated', c: AC.red.main     },
    in_progress:{ label:'In Progress',c: AC.blue.main    },
    completed:  { label:'Completed',  c: AC.emerald.main },
    on_hold:    { label:'On Hold',    c: AC.amber.main   },
    cancelled:  { label:'Cancelled',  c: AC.red.main     },
    pending:    { label:'Pending',    c: AC.amber.main   },
    shipped:    { label:'Shipped',    c: AC.blue.main    },
    delivered:  { label:'Delivered',  c: AC.emerald.main },
  };
  const cfg = map[status] || { label:status, c:T.muted };
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      fontSize:11, fontWeight:600, padding:'3px 10px', borderRadius:20,
      background:cfg.c+'22', color:cfg.c, border:`1px solid ${cfg.c}44`,
    }}>
      <span style={{ width:5, height:5, borderRadius:'50%', background:cfg.c }}></span>
      {cfg.label}
    </span>
  );
}

function KpiCard({ label, value, sub, icon, color='emerald' }) {
  const ac = AC[color] || AC.emerald;
  const [hov, setHov] = React.useState(false);
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{
      background:T.surface, border:`1px solid ${hov ? ac.main : T.border}`,
      borderRadius:12, padding:'20px 22px', display:'flex', alignItems:'center', gap:16,
      transition:'border-color 0.2s, transform 0.2s, box-shadow 0.2s',
      transform: hov?'translateY(-2px)':'none',
      boxShadow: hov?'0 8px 24px rgba(0,0,0,0.25)':'0 1px 4px rgba(0,0,0,0.2)',
      flex:1, minWidth:0, cursor:'default',
    }}>
      <div style={{ width:48, height:48, borderRadius:12, background:ac.dim, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
        <i className={`fas ${icon}`} style={{ color:ac.main, fontSize:20 }}></i>
      </div>
      <div style={{ minWidth:0 }}>
        <div style={{ fontSize:12, color:T.muted, marginBottom:2 }}>{label}</div>
        <div style={{ fontSize:22, fontWeight:700, color:T.text, letterSpacing:'-0.5px' }}>{value}</div>
        {sub && <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>{sub}</div>}
      </div>
    </div>
  );
}

function ProgressBar({ pct }) {
  const c = pct===100 ? AC.emerald.main : pct>=50 ? AC.blue.main : AC.amber.main;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
      <div style={{ flex:1, height:5, borderRadius:3, background:T.surface2, overflow:'hidden' }}>
        <div style={{ width:`${pct}%`, height:'100%', background:c, borderRadius:3 }}></div>
      </div>
      <span style={{ fontSize:11, color:T.muted, minWidth:28, textAlign:'right' }}>{pct}%</span>
    </div>
  );
}

function Card({ children, style }) {
  return (
    <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, overflow:'hidden', ...style }}>
      {children}
    </div>
  );
}

function CardHeader({ icon, iconColor, title, onAction, actionLabel }) {
  return (
    <div style={{ padding:'14px 20px', borderBottom:`1px solid ${T.border}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        {icon && <i className={`fas ${icon}`} style={{ color:iconColor||T.muted, fontSize:14 }}></i>}
        <span style={{ fontWeight:600, fontSize:14, color:T.text }}>{title}</span>
      </div>
      {onAction && (
        <button onClick={onAction} style={{
          fontSize:12, color:T.muted, background:'none', border:`1px solid ${T.border}`,
          borderRadius:6, padding:'4px 10px', cursor:'pointer',
        }}>{actionLabel||'View all'}</button>
      )}
    </div>
  );
}

function DataTable({ cols, rows, emptyMsg='No data.' }) {
  return (
    <div style={{ overflowX:'auto' }}>
      <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
        <thead>
          <tr style={{ borderBottom:`1px solid ${T.border}` }}>
            {cols.map((c,i) => (
              <th key={i} style={{ padding:'10px 16px', textAlign:c.right?'right':'left', color:T.muted, fontWeight:600, fontSize:11, letterSpacing:'0.05em', textTransform:'uppercase', whiteSpace:'nowrap' }}>{c.label}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.length===0 ? (
            <tr><td colSpan={cols.length} style={{ padding:32, textAlign:'center', color:T.muted }}>{emptyMsg}</td></tr>
          ) : rows.map((row,ri) => (
            <tr key={ri} style={{ borderBottom:`1px solid ${T.border}22` }}
              onMouseEnter={e=>e.currentTarget.style.background=T.surface2}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}
            >
              {cols.map((c,ci) => (
                <td key={ci} style={{ padding:'12px 16px', color:T.text, textAlign:c.right?'right':'left' }}>
                  {c.render ? c.render(row) : row[c.key]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function Btn({ children, variant='primary', icon, onClick, small, acHue }) {
  const [hov, setHov] = React.useState(false);
  const ac = acHue ? `oklch(0.70 0.17 ${acHue})` : AC.emerald.main;
  const acDim = acHue ? `oklch(0.70 0.17 ${acHue} / 0.15)` : AC.emerald.dim;
  const base = { display:'inline-flex', alignItems:'center', gap:6, borderRadius:8, fontWeight:600, cursor:'pointer', fontSize:small?12:13, padding:small?'5px 12px':'8px 16px', border:'1px solid transparent', transition:'all 0.15s' };
  let s = {};
  if (variant==='primary') s = { ...base, background:hov?ac+'cc':ac, color:'#0d1117', borderColor:ac };
  else if (variant==='ghost') s = { ...base, background:hov?T.surface2:'transparent', color:T.muted, borderColor:'transparent' };
  else s = { ...base, background:hov?acDim:'transparent', color:ac, borderColor:hov?ac+'66':T.border };
  return (
    <button style={s} onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
      {icon && <i className={`fas ${icon}`}></i>}
      {children}
    </button>
  );
}

function PageHeader({ title, icon, acHue, children }) {
  const ac = acHue ? `oklch(0.70 0.17 ${acHue})` : AC.emerald.main;
  const dim = acHue ? `oklch(0.70 0.17 ${acHue} / 0.15)` : AC.emerald.dim;
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ width:38, height:38, borderRadius:10, background:dim, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <i className={`fas ${icon}`} style={{ color:ac, fontSize:16 }}></i>
        </div>
        <h1 style={{ margin:0, fontSize:22, fontWeight:700, color:T.text, letterSpacing:'-0.4px' }}>{title}</h1>
      </div>
      <div style={{ display:'flex', gap:8 }}>{children}</div>
    </div>
  );
}

              transition:'background 0.15s, color 0.15s',

// ─── TWEAKS PANEL (inline) ─────────────────────────────────────────────────
function TweaksInline({ tweaks, setTweak, onClose }) {
  const acHue = tweaks.accentHue;
  const ac = `oklch(0.70 0.17 ${acHue})`;
  return (
    <div style={{
      position:'fixed', bottom:80, right:16, width:260,
      background:T.surface, border:`1px solid ${T.border}`, borderRadius:14,
      boxShadow:'0 16px 48px rgba(0,0,0,0.5)', zIndex:1000, padding:16,
      fontFamily:'Plus Jakarta Sans, sans-serif',
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <span style={{ fontWeight:700, fontSize:14, color:T.text }}>Tweaks</span>
        <button onClick={onClose} style={{ background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:16 }}>×</button>
      </div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, color:T.muted, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>Accent Color</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:6, marginBottom:8 }}>
          {[{hue:162,l:'Emerald'},{hue:245,l:'Blue'},{hue:300,l:'Purple'},{hue:75,l:'Amber'},{hue:25,l:'Red'},{hue:200,l:'Cyan'}].map(c=>(
            <button key={c.hue} title={c.l} onClick={()=>setTweak('accentHue',c.hue)} style={{
              width:'100%', aspectRatio:'1', borderRadius:6, cursor:'pointer',
              background:`oklch(0.70 0.17 ${c.hue})`,
              border:`2px solid ${tweaks.accentHue===c.hue?'#fff':'transparent'}`,
            }}></button>
          ))}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <input type="range" min={0} max={360} step={1} value={acHue} onChange={e=>setTweak('accentHue',Number(e.target.value))}
            style={{ flex:1, accentColor:ac }} />
          <span style={{ fontSize:12, color:T.muted, minWidth:30 }}>{acHue}°</span>
        </div>
      </div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, color:T.muted, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>Theme</div>
        <div style={{ display:'flex', gap:4 }}>
          {['dark','light'].map(th=>(
            <button key={th} onClick={()=>setTweak('theme',th)} style={{
              flex:1, padding:'7px 0', borderRadius:7, border:`1px solid ${tweaks.theme===th?ac:T.border}`,
              background:tweaks.theme===th?ac+'22':'transparent', color:tweaks.theme===th?ac:T.muted,
              cursor:'pointer', fontSize:12, fontWeight:600, transition:'all 0.15s',
              display:'flex', alignItems:'center', justifyContent:'center', gap:6,
            }}>
              <i className={`fas ${th==='dark'?'fa-moon':'fa-sun'}`} style={{ fontSize:11 }}></i>
              {th.charAt(0).toUpperCase()+th.slice(1)}
            </button>
          ))}
        </div>
      </div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, color:T.muted, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>Density</div>
        <div style={{ display:'flex', gap:4 }}>
          {['compact','comfortable','spacious'].map(d=>(
            <button key={d} onClick={()=>setTweak('density',d)} style={{
              flex:1, padding:'5px 0', borderRadius:7, border:`1px solid ${tweaks.density===d?ac:T.border}`,
              background:tweaks.density===d?ac+'22':'transparent', color:tweaks.density===d?ac:T.muted,
              cursor:'pointer', fontSize:11, fontWeight:600, transition:'all 0.15s', textTransform:'capitalize',
            }}>{d.slice(0,5)}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": 294,
  "density": "spacious",
  "sidebarCollapsed": false,
  "theme": "dark"
}/*EDITMODE-END*/;

const SCREENS = {
  dashboard:   ScreenDashboard,
  employees:   ScreenEmployees,
  finance:     ScreenFinance,
  hr:          ScreenHR,
  inventory:   ScreenInventory,
  meetings:    ScreenMeetings,
  marketplace: ScreenMarketplace,
};

function App() {
  const [screen, setScreen] = React.useState('dashboard');
  const [animKey, setAnimKey] = React.useState(0);
  const [tweaks, setTweakState] = React.useState(TWEAK_DEFAULTS);
  const [collapsed, setCollapsed] = React.useState(() => {
    const s = localStorage.getItem('erpis-sidebar');
    return s ? s==='true' : TWEAK_DEFAULTS.sidebarCollapsed;
  });
  const [showTweaks, setShowTweaks] = React.useState(false);

  function setTweak(key, val) {
    setTweakState(prev => {
      const next = {...prev, [key]:val};
      try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:next},'*'); } catch(e){}
      return next;
    });
  }

  // Tweaks panel toggle from host
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleNav = (id) => {
    if (id === screen) return;
    setScreen(id);
    setAnimKey(k => k+1);
  };

  const toggleSidebar = () => {
    const next = !collapsed;
    setCollapsed(next);
    localStorage.setItem('erpis-sidebar', String(next));
  };

  // Apply theme tokens globally before render
  T = tweaks.theme === 'light' ? LIGHT_T : DARK_T;

  const density = tweaks.density;
  const pad = density==='compact' ? '16px 20px' : density==='spacious' ? '32px 40px' : '24px 32px';
  const Active = SCREENS[screen] || ScreenDashboard;
  const acHue = tweaks.accentHue;
  const ac = `oklch(0.70 0.17 ${acHue})`;

  const isDark = tweaks.theme !== 'light';

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden', fontFamily:'Plus Jakarta Sans, sans-serif', background:T.bg }}>
      <style>{`body{background:${T.bg}}select option{background:${T.surface2};color:${T.text}}::-webkit-scrollbar-thumb{background:${T.border}}`}</style>
      <Sidebar active={screen} onNav={handleNav} collapsed={collapsed} acHue={acHue} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>
        <TopBar onToggle={toggleSidebar} isDark={isDark} onThemeToggle={()=>setTweak('theme', isDark?'light':'dark')} />
        <main style={{ flex:1, overflowY:'auto', padding:pad, background:T.bg }}>
          <div key={animKey} className="screen-enter">
            <Active acHue={acHue} />
          </div>
        </main>
      </div>

      {/* FAB for tweaks if opened standalone */}
      {showTweaks && (
        <TweaksInline tweaks={tweaks} setTweak={setTweak} onClose={()=>{setShowTweaks(false);try{window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}catch(e){}}} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
